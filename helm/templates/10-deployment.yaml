apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: ibm-iam-operator
    app.kubernetes.io/managed-by: ibm-iam-operator
    app.kubernetes.io/name: ibm-iam-operator
    productName: IBM_Cloud_Platform_Common_Services
  name: ibm-iam-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      name: ibm-iam-operator
  template:
    metadata:
      annotations:
        productID: 068a62892a1e4db39641342e592daa25
        productMetric: FREE
        productName: IBM Cloud Platform Common Services
      labels:
        app.kubernetes.io/instance: ibm-iam-operator
        app.kubernetes.io/managed-by: ibm-iam-operator
        app.kubernetes.io/name: ibm-iam-operator
        intent: projected
        name: ibm-iam-operator
        productName: IBM_Cloud_Platform_Common_Services
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
                - ppc64le
                - s390x
      containers:
      - command:
        - ibm-iam-operator
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OPERATOR_NAME
          value: ibm-iam-operator
        - name: ROUTE_HTTP_PORT
          value: ""
        - name: ROUTE_HTTPS_PORT
          value: ""
        - name: cluster_name
          value: ""
        - name: ICP_PLATFORM_AUTH_IMAGE
          value: "{{ .Values.imagePullPrefix }}/{{ .Values.imageRegistryNamespaceOperand }}/icp-platform-auth:{{ .Values.operands.platformAuthService.imageTag }}"
        - name: ICP_IDENTITY_PROVIDER_IMAGE
          value: "{{ .Values.imagePullPrefix }}/{{ .Values.imageRegistryNamespaceOperand }}/icp-identity-provider:{{ .Values.operands.platformIdentityProvider.imageTag }}"
        - name: ICP_IDENTITY_MANAGER_IMAGE
          value: "{{ .Values.imagePullPrefix }}/{{ .Values.imageRegistryNamespaceOperand }}/icp-identity-manager:{{ .Values.operands.platformIdentityManagement.imageTag }}"
        - name: IM_INITCONTAINER_IMAGE
          value: "{{ .Values.imagePullPrefix }}/{{ .Values.imageRegistryNamespaceOperand }}/im-initcontainer:{{ .Values.operands.imInitContainer.imageTag }}"
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: IMAGE_PULL_SECRET
          value: {{ .Values.imagePullSecret }}
        image: "{{ .Values.imagePullPrefix }}/{{ .Values.imageRegistryNamespaceOperator }}/ibm-iam-operator:{{ .Values.operator.imageTag }}"
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        name: ibm-iam-operator
        resources:
          limits:
            cpu: 25m
            memory: 320Mi
          requests:
            cpu: 20m
            ephemeral-storage: 256Mi
            memory: 80Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
      imagePullSecrets:
      - name: "{{ .Values.imagePullSecret }}"
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: ibm-iam-operator
